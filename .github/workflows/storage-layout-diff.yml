name: Storage Layout Diff

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

env:
    FOUNDRY_PROFILE: ci

jobs:
    storage-layout-diff:
        name: Storage Layout Diff
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1

            - name: Build contracts
              run: forge build

            - name: Generate storage layouts
              run: |
                  mkdir -p .storage-layouts
                  # Edit this list to match your contract names
                  CONTRACTS=("YourContract" "AnotherContract")
                  for contract in "${CONTRACTS[@]}"; do
                    forge inspect "$contract" storage-layout > ".storage-layouts/${contract}.json" 2>/dev/null || true
                  done

            - name: Diff against baseline
              run: |
                  CHANGED=0
                  for file in .storage-layouts/*.json; do
                    name=$(basename "$file")
                    baseline=".storage-baselines/$name"
                    if [ -f "$baseline" ]; then
                      if ! diff -u "$baseline" "$file"; then
                        echo "❌ Storage layout changed for $name"
                        CHANGED=1
                      fi
                    else
                      echo "⚠️  No baseline found for $name — add it to .storage-baselines/"
                    fi
                  done
                  if [ "$CHANGED" -eq 1 ]; then
                    exit 1
                  fi
