name: Mythril Security Scan

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

env:
    FOUNDRY_PROFILE: ci

jobs:
    mythril:
        name: Mythril Security Scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Install Foundry
              uses: foundry-rs/foundry-toolchain@v1

            - name: Build contracts
              run: forge build

            - name: Run Mythril on all contracts
              run: |
                  find src -name "*.sol" | while read contract; do
                    echo "🔍 Scanning $contract ..."
                    docker run --rm \
                      -v "$(pwd):/project" \
                      mythril/myth analyze "/project/$contract" \
                      --solc-json /project/foundry.toml \
                      --execution-timeout 60 || true
                  done
